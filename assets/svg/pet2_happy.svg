<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wings raised (excited) -->
  <ellipse cx="34" cy="136" rx="22" ry="17" fill="white" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(55 34 136)"/>
  <ellipse cx="166" cy="136" rx="22" ry="17" fill="white" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(-55 166 136)"/>
  <!-- Main body -->
  <ellipse cx="100" cy="114" rx="66" ry="72" fill="white" stroke="#2A2A2A" stroke-width="4"/>
  <!-- Green leaf sprout -->
  <ellipse cx="93" cy="40" rx="9" ry="15" fill="#7CC447" stroke="#2A2A2A" stroke-width="2.5" transform="rotate(-22 93 40)"/>
  <ellipse cx="110" cy="38" rx="8" ry="13" fill="#55A028" stroke="#2A2A2A" stroke-width="2" transform="rotate(18 110 38)"/>
  <!-- Big pink blush -->
  <ellipse cx="62" cy="98" rx="18" ry="13" fill="#FFB6C1" opacity="0.9"/>
  <ellipse cx="138" cy="98" rx="18" ry="13" fill="#FFB6C1" opacity="0.9"/>
  <!-- Arc eyes (^.^) -->
  <path d="M 73 82 Q 84 68 95 82" stroke="#2A2A2A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 105 82 Q 116 68 127 82" stroke="#2A2A2A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Open beak top -->
  <ellipse cx="100" cy="105" rx="22" ry="12" fill="#FF9900" stroke="#2A2A2A" stroke-width="3"/>
  <!-- Open beak bottom (mouth open) -->
  <ellipse cx="100" cy="116" rx="16" ry="8" fill="#CC6600" stroke="#2A2A2A" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="83" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
  <ellipse cx="117" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
</svg>
