<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wings behind body -->
  <ellipse cx="38" cy="148" rx="22" ry="17" fill="white" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(35 38 148)"/>
  <ellipse cx="162" cy="148" rx="22" ry="17" fill="white" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(-35 162 148)"/>
  <!-- Main body (white round blob) -->
  <ellipse cx="100" cy="114" rx="66" ry="72" fill="white" stroke="#2A2A2A" stroke-width="4"/>
  <!-- Green leaf sprout -->
  <ellipse cx="93" cy="40" rx="9" ry="15" fill="#7CC447" stroke="#2A2A2A" stroke-width="2.5" transform="rotate(-22 93 40)"/>
  <ellipse cx="110" cy="38" rx="8" ry="13" fill="#55A028" stroke="#2A2A2A" stroke-width="2" transform="rotate(18 110 38)"/>
  <!-- Pink blush -->
  <ellipse cx="65" cy="98" rx="16" ry="11" fill="#FFB6C1" opacity="0.8"/>
  <ellipse cx="135" cy="98" rx="16" ry="11" fill="#FFB6C1" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="84" cy="80" r="5.5" fill="#2A2A2A"/>
  <circle cx="116" cy="80" r="5.5" fill="#2A2A2A"/>
  <circle cx="86" cy="78" r="2" fill="white"/>
  <circle cx="118" cy="78" r="2" fill="white"/>
  <!-- Flat oval beak -->
  <ellipse cx="100" cy="106" rx="22" ry="12" fill="#FF9900" stroke="#2A2A2A" stroke-width="3"/>
  <!-- Feet -->
  <ellipse cx="83" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
  <ellipse cx="117" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
</svg>
