<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wings limp -->
  <ellipse cx="38" cy="154" rx="22" ry="17" fill="#F0FFF0" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(18 38 154)"/>
  <ellipse cx="162" cy="154" rx="22" ry="17" fill="#F0FFF0" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(-18 162 154)"/>
  <!-- Main body (pale green tint) -->
  <ellipse cx="100" cy="114" rx="66" ry="72" fill="#F0FFF0" stroke="#2A2A2A" stroke-width="4"/>
  <!-- Wilted leaf -->
  <ellipse cx="93" cy="44" rx="9" ry="15" fill="#9DC96D" stroke="#2A2A2A" stroke-width="2.5" transform="rotate(-42 93 44)"/>
  <ellipse cx="106" cy="44" rx="8" ry="13" fill="#7DAF50" stroke="#2A2A2A" stroke-width="2" transform="rotate(-8 106 44)"/>
  <!-- Pale blush -->
  <ellipse cx="65" cy="98" rx="16" ry="11" fill="#C8E6C9" opacity="0.6"/>
  <ellipse cx="135" cy="98" rx="16" ry="11" fill="#C8E6C9" opacity="0.6"/>
  <!-- X eyes -->
  <line x1="76" y1="73" x2="90" y2="87" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
  <line x1="90" y1="73" x2="76" y2="87" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="73" x2="124" y2="87" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="73" x2="110" y2="87" stroke="#2A2A2A" stroke-width="4" stroke-linecap="round"/>
  <!-- Beak (slightly open, droopy) -->
  <ellipse cx="100" cy="106" rx="22" ry="11" fill="#FF9900" stroke="#2A2A2A" stroke-width="3"/>
  <!-- Sweat drop -->
  <path d="M 140 66 C 136 57 132 70 140 74 C 148 70 144 57 140 66 Z" fill="#AAD8F0"/>
  <!-- Feet -->
  <ellipse cx="83" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
  <ellipse cx="117" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
</svg>
