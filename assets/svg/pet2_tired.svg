<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wings droopy -->
  <ellipse cx="38" cy="152" rx="22" ry="17" fill="white" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(22 38 152)"/>
  <ellipse cx="162" cy="152" rx="22" ry="17" fill="white" stroke="#2A2A2A" stroke-width="3.5" transform="rotate(-22 162 152)"/>
  <!-- Main body -->
  <ellipse cx="100" cy="114" rx="66" ry="72" fill="white" stroke="#2A2A2A" stroke-width="4"/>
  <!-- Leaf droopy -->
  <ellipse cx="93" cy="42" rx="9" ry="15" fill="#7CC447" stroke="#2A2A2A" stroke-width="2.5" transform="rotate(-38 93 42)"/>
  <ellipse cx="108" cy="40" rx="8" ry="13" fill="#55A028" stroke="#2A2A2A" stroke-width="2" transform="rotate(5 108 40)"/>
  <!-- Faded blush -->
  <ellipse cx="65" cy="98" rx="16" ry="11" fill="#FFB6C1" opacity="0.45"/>
  <ellipse cx="135" cy="98" rx="16" ry="11" fill="#FFB6C1" opacity="0.45"/>
  <!-- Tired eyes: dot with eyelid -->
  <circle cx="84" cy="82" r="5.5" fill="#2A2A2A"/>
  <circle cx="116" cy="82" r="5.5" fill="#2A2A2A"/>
  <ellipse cx="84" cy="79" rx="7" ry="5" fill="white"/>
  <ellipse cx="116" cy="79" rx="7" ry="5" fill="white"/>
  <!-- Zzz bubbles -->
  <circle cx="132" cy="58" r="5" fill="white" stroke="#AAAAAA" stroke-width="1.5"/>
  <text x="129" y="62" font-size="7" fill="#AAAAAA" font-weight="bold">z</text>
  <circle cx="142" cy="47" r="6" fill="white" stroke="#BBBBBB" stroke-width="1.5"/>
  <text x="138.5" y="51.5" font-size="8" fill="#BBBBBB" font-weight="bold">z</text>
  <!-- Flat beak -->
  <ellipse cx="100" cy="107" rx="22" ry="11" fill="#FF9900" stroke="#2A2A2A" stroke-width="3"/>
  <!-- Feet -->
  <ellipse cx="83" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
  <ellipse cx="117" cy="184" rx="17" ry="8" fill="#FF9900" stroke="#2A2A2A" stroke-width="2.5"/>
</svg>
