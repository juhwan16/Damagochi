<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow (bigger for happy bounce) -->
  <ellipse cx="100" cy="192" rx="54" ry="9" fill="#806000" opacity="0.2"/>

  <!-- Wings (raised for happy) -->
  <ellipse cx="20" cy="148" rx="19" ry="26" fill="#FFDF00" stroke="#C8A800" stroke-width="2" transform="rotate(20 20 148)"/>
  <ellipse cx="180" cy="148" rx="19" ry="26" fill="#FFDF00" stroke="#C8A800" stroke-width="2" transform="rotate(-20 180 148)"/>

  <!-- Main duck body -->
  <ellipse cx="100" cy="118" rx="70" ry="74" fill="#FFE620"/>
  <ellipse cx="100" cy="118" rx="70" ry="74" fill="none" stroke="#C8A800" stroke-width="2.5"/>

  <!-- Body shine -->
  <ellipse cx="72" cy="82" rx="24" ry="15" fill="white" opacity="0.28" transform="rotate(-18 72 82)"/>

  <!-- Tactical plate carrier -->
  <rect x="30" y="148" width="140" height="44" rx="14" fill="#2C2A26"/>
  <rect x="68" y="152" width="64" height="40" rx="10" fill="#1E1C18"/>
  <line x1="70" y1="163" x2="130" y2="163" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <line x1="70" y1="173" x2="130" y2="173" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <line x1="70" y1="183" x2="130" y2="183" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <rect x="82" y="186" width="36" height="10" rx="4" fill="#28261E"/>

  <!-- Tactical helmet -->
  <ellipse cx="100" cy="50" rx="62" ry="50" fill="#242424"/>
  <rect x="44" y="76" width="112" height="18" rx="9" fill="#1A1A1A"/>
  <ellipse cx="76" cy="85" rx="20" ry="11" fill="#141414"/>
  <ellipse cx="76" cy="85" rx="15" ry="8" fill="#B88C14"/>
  <ellipse cx="69" cy="81" rx="5" ry="3" fill="white" opacity="0.3"/>
  <ellipse cx="124" cy="85" rx="20" ry="11" fill="#141414"/>
  <ellipse cx="124" cy="85" rx="15" ry="8" fill="#B88C14"/>
  <ellipse cx="117" cy="81" rx="5" ry="3" fill="white" opacity="0.3"/>
  <rect x="38" y="90" width="124" height="11" rx="5" fill="#1A1A1A"/>
  <rect x="88" y="14" width="24" height="14" rx="5" fill="#1A1A1A"/>
  <rect x="94" y="11" width="12" height="7" rx="3" fill="#141414"/>

  <!-- Happy ^^ duck eyes -->
  <circle cx="76" cy="112" r="20" fill="white"/>
  <path d="M 58 116 Q 76 96 94 116" stroke="#1A0800" stroke-width="13" fill="none" stroke-linecap="round"/>
  <circle cx="67" cy="103" r="5" fill="white" opacity="0.85"/>
  <circle cx="124" cy="112" r="20" fill="white"/>
  <path d="M 106 116 Q 124 96 142 116" stroke="#1A0800" stroke-width="13" fill="none" stroke-linecap="round"/>
  <circle cx="115" cy="103" r="5" fill="white" opacity="0.85"/>

  <!-- Happy open beak (tipped up) -->
  <ellipse cx="100" cy="134" rx="18" ry="12" fill="#FF8800"/>
  <path d="M 84 134 Q 100 126 116 134" stroke="#C06000" stroke-width="1.5" fill="none"/>

  <!-- Sparkles -->
  <g transform="translate(22,52)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(178,44)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(162,22)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
