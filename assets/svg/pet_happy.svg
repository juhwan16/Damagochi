<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="192" rx="52" ry="9" fill="#1A1A10" opacity="0.2"/>

  <!-- Body (plate carrier, coyote tan) -->
  <ellipse cx="100" cy="138" rx="66" ry="58" fill="#7A7260"/>
  <ellipse cx="100" cy="138" rx="66" ry="58" fill="none" stroke="#5C5648" stroke-width="2.5"/>
  <!-- Front plate panel -->
  <rect x="68" y="108" width="64" height="58" rx="10" fill="#6A6352"/>
  <!-- MOLLE webbing lines -->
  <line x1="70" y1="120" x2="130" y2="120" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <line x1="70" y1="130" x2="130" y2="130" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <line x1="70" y1="140" x2="130" y2="140" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <line x1="70" y1="150" x2="130" y2="150" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <!-- Admin pouch -->
  <rect x="80" y="154" width="40" height="12" rx="5" fill="#58523E"/>

  <!-- Arms -->
  <ellipse cx="26" cy="132" rx="20" ry="13" fill="#7A7260" stroke="#5C5648" stroke-width="2"/>
  <ellipse cx="174" cy="132" rx="20" ry="13" fill="#7A7260" stroke="#5C5648" stroke-width="2"/>

  <!-- Neck / balaclava -->
  <ellipse cx="100" cy="108" rx="34" ry="16" fill="#1E1E1E"/>

  <!-- Helmet (FAST-style) -->
  <ellipse cx="100" cy="60" rx="62" ry="54" fill="#242424"/>
  <!-- Helmet lower brim -->
  <rect x="40" y="98" width="120" height="12" rx="5" fill="#1A1A1A"/>

  <!-- Goggle bridge -->
  <rect x="88" y="82" width="24" height="10" rx="5" fill="#141414"/>

  <!-- Left goggle -->
  <circle cx="74" cy="87" r="19" fill="#141414"/>
  <circle cx="74" cy="87" r="14" fill="#B88C14"/>
  <!-- Happy ^^ arc left -->
  <path d="M 62 91 Q 74 73 86 91" stroke="#1A1000" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="67" cy="79" r="4" fill="white" opacity="0.35"/>

  <!-- Right goggle -->
  <circle cx="126" cy="87" r="19" fill="#141414"/>
  <circle cx="126" cy="87" r="14" fill="#B88C14"/>
  <!-- Happy ^^ arc right -->
  <path d="M 114 91 Q 126 73 138 91" stroke="#1A1000" stroke-width="9" fill="none" stroke-linecap="round"/>
  <circle cx="119" cy="79" r="4" fill="white" opacity="0.35"/>

  <!-- NVG mount on helmet -->
  <rect x="88" y="16" width="24" height="14" rx="5" fill="#1A1A1A"/>
  <rect x="94" y="13" width="12" height="7" rx="3" fill="#141414"/>

  <!-- Wide happy mouth -->
  <path d="M 85 113 Q 100 125 115 113" stroke="#7A5A30" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Sparkles -->
  <g transform="translate(22,52)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(178,44)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g transform="translate(160,22)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
