<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="192" rx="54" ry="9" fill="#806000" opacity="0.2"/>

  <!-- Wings (raised happy) -->
  <ellipse cx="20" cy="144" rx="19" ry="26" fill="#FFDF00" stroke="#C8A800" stroke-width="2" transform="rotate(22 20 144)"/>
  <ellipse cx="180" cy="144" rx="19" ry="26" fill="#FFDF00" stroke="#C8A800" stroke-width="2" transform="rotate(-22 180 144)"/>

  <!-- Main duck body -->
  <ellipse cx="100" cy="118" rx="70" ry="74" fill="#FFE620"/>
  <ellipse cx="100" cy="118" rx="70" ry="74" fill="none" stroke="#C8A800" stroke-width="2.5"/>

  <!-- Body shine -->
  <ellipse cx="72" cy="80" rx="24" ry="15" fill="white" opacity="0.28" transform="rotate(-18 72 80)"/>

  <!-- Left eye (looking slightly up-left, derpy) -->
  <circle cx="74" cy="108" r="22" fill="white"/>
  <circle cx="71" cy="104" r="13" fill="#1A0800"/>
  <circle cx="64" cy="98" r="6" fill="white" opacity="0.85"/>
  <!-- Teardrop under left eye -->
  <path d="M 68 126 C 64 118 62 132 68 138 C 74 132 72 118 68 126 Z" fill="#AAD8F0" opacity="0.8"/>

  <!-- Right eye (looking slightly up-right, derpy) -->
  <circle cx="126" cy="108" r="22" fill="white"/>
  <circle cx="129" cy="104" r="13" fill="#1A0800"/>
  <circle cx="136" cy="98" r="6" fill="white" opacity="0.85"/>

  <!-- Dumb open beak (gaping slightly) -->
  <ellipse cx="100" cy="138" rx="22" ry="14" fill="#FF8800"/>
  <!-- Lower beak -->
  <ellipse cx="100" cy="145" rx="18" ry="8" fill="#E07000"/>
  <!-- Beak crease -->
  <path d="M 80 138 Q 100 134 120 138" stroke="#C06000" stroke-width="1.5" fill="none"/>

  <!-- Sparkles -->
  <g transform="translate(22,52)">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(178,44)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
