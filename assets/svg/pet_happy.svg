<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- glow -->
  <circle cx="100" cy="115" r="80" fill="#FFE8F5" opacity="0.7"/>
  <!-- ear bumps -->
  <circle cx="55" cy="62" r="22" fill="#FFC4E0"/>
  <circle cx="145" cy="62" r="22" fill="#FFC4E0"/>
  <!-- body -->
  <ellipse cx="100" cy="120" rx="68" ry="63" fill="#FFD6EC"/>
  <ellipse cx="100" cy="120" rx="68" ry="63" fill="none" stroke="#FF8CC0" stroke-width="3"/>
  <!-- arms raised -->
  <ellipse cx="38" cy="88" rx="16" ry="24" fill="#FFD6EC" stroke="#FF8CC0" stroke-width="2.5" transform="rotate(-35 38 88)"/>
  <ellipse cx="162" cy="88" rx="16" ry="24" fill="#FFD6EC" stroke="#FF8CC0" stroke-width="2.5" transform="rotate(35 162 88)"/>
  <!-- happy arch eyes -->
  <path d="M 67 110 Q 78 95 89 110" fill="none" stroke="#3D1A00" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 111 110 Q 122 95 133 110" fill="none" stroke="#3D1A00" stroke-width="4.5" stroke-linecap="round"/>
  <!-- eye shine dots -->
  <circle cx="70" cy="106" r="2.5" fill="#3D1A00"/>
  <circle cx="130" cy="106" r="2.5" fill="#3D1A00"/>
  <!-- cheeks -->
  <ellipse cx="63" cy="126" rx="15" ry="9" fill="#FF8CC0" opacity="0.45"/>
  <ellipse cx="137" cy="126" rx="15" ry="9" fill="#FF8CC0" opacity="0.45"/>
  <!-- nose -->
  <circle cx="100" cy="118" r="3" fill="#FF8CC0"/>
  <!-- big smile -->
  <path d="M 72 133 Q 100 158 128 133" fill="none" stroke="#E8355A" stroke-width="4" stroke-linecap="round"/>
  <!-- sparkle left -->
  <g transform="translate(22,35)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- sparkle right -->
  <g transform="translate(176,30)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  </g>
  <circle cx="40" cy="58" r="4" fill="#FFD700" opacity="0.85"/>
  <circle cx="160" cy="48" r="3.5" fill="#FFD700" opacity="0.85"/>
</svg>
