<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ground shadow -->
  <ellipse cx="100" cy="191" rx="52" ry="8" fill="#FFD700" opacity="0.15"/>

  <!-- Left ear -->
  <ellipse cx="58" cy="50" rx="24" ry="28" fill="#FFB0D0"/>
  <ellipse cx="58" cy="54" rx="14" ry="18" fill="#FFE8F8"/>
  <!-- Right ear -->
  <ellipse cx="142" cy="50" rx="24" ry="28" fill="#FFB0D0"/>
  <ellipse cx="142" cy="54" rx="14" ry="18" fill="#FFE8F8"/>

  <!-- Body (slightly bigger, happy) -->
  <ellipse cx="100" cy="118" rx="75" ry="73" fill="#FFD0E8"/>
  <ellipse cx="100" cy="118" rx="75" ry="73" fill="none" stroke="#FF90BE" stroke-width="2.5"/>

  <!-- Arms raised slightly -->
  <ellipse cx="19" cy="120" rx="17" ry="14" fill="#FFD0E8" stroke="#FF90BE" stroke-width="2.5" transform="rotate(-18 19 120)"/>
  <ellipse cx="181" cy="120" rx="17" ry="14" fill="#FFD0E8" stroke="#FF90BE" stroke-width="2.5" transform="rotate(18 181 120)"/>

  <!-- Left eye white -->
  <ellipse cx="78" cy="102" rx="21" ry="23" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="122" cy="102" rx="21" ry="23" fill="white"/>

  <!-- Pupils big -->
  <circle cx="79" cy="106" r="14" fill="#3A1800"/>
  <circle cx="123" cy="106" r="14" fill="#3A1800"/>

  <!-- Inner pupil lighter -->
  <circle cx="80" cy="108" r="7" fill="#5C2E00" opacity="0.55"/>
  <circle cx="124" cy="108" r="7" fill="#5C2E00" opacity="0.55"/>

  <!-- Eye shine large -->
  <circle cx="72" cy="98" r="6.5" fill="white"/>
  <circle cx="116" cy="98" r="6.5" fill="white"/>
  <!-- Eye shine small -->
  <circle cx="86" cy="112" r="3" fill="white"/>
  <circle cx="130" cy="112" r="3" fill="white"/>
  <!-- Tiny twinkle -->
  <circle cx="72" cy="112" r="1.5" fill="white"/>
  <circle cx="116" cy="112" r="1.5" fill="white"/>

  <!-- Nose -->
  <circle cx="100" cy="118" r="4.5" fill="#FF6B99"/>

  <!-- Big happy blush -->
  <ellipse cx="55" cy="127" rx="23" ry="15" fill="#FF90BE" opacity="0.38"/>
  <ellipse cx="145" cy="127" rx="23" ry="15" fill="#FF90BE" opacity="0.38"/>

  <!-- Wide happy mouth -->
  <path d="M 75 134 Q 100 163 125 134" stroke="#E8305A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Sparkles -->
  <g transform="translate(24,34)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(176,28)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  </g>
  <circle cx="38" cy="58" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="163" cy="47" r="3.5" fill="#FFD700" opacity="0.8"/>

  <!-- Floating hearts -->
  <path d="M 153 78 C 153 74 149 71 149 75 C 149 71 145 74 145 78 C 145 83 153 88 153 88 C 153 88 161 83 161 78 C 161 74 157 71 157 75 C 157 71 153 74 153 78 Z" fill="#FF6B99" opacity="0.7"/>
  <path d="M 39 80 C 39 77 36 75 36 78 C 36 75 33 77 33 80 C 33 84 39 88 39 88 C 39 88 45 84 45 80 C 45 77 42 75 42 78 C 42 75 39 77 39 80 Z" fill="#FF6B99" opacity="0.55"/>
</svg>
