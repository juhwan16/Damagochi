<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyH" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#FFE8F4"/>
      <stop offset="100%" stop-color="#FFB8D8"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="191" rx="52" ry="8" fill="#FFD700" opacity="0.16"/>

  <!-- Left ear -->
  <ellipse cx="60" cy="52" rx="23" ry="27" fill="#FFB0CC"/>
  <ellipse cx="60" cy="56" rx="13" ry="17" fill="#FFE0F4"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="52" rx="23" ry="27" fill="#FFB0CC"/>
  <ellipse cx="140" cy="56" rx="13" ry="17" fill="#FFE0F4"/>

  <!-- Body -->
  <ellipse cx="100" cy="118" rx="74" ry="72" fill="url(#bodyH)"/>
  <ellipse cx="100" cy="118" rx="74" ry="72" fill="none" stroke="#FFB0CC" stroke-width="2.5"/>
  <!-- Body shine -->
  <ellipse cx="75" cy="93" rx="28" ry="17" fill="white" opacity="0.22" transform="rotate(-20 75 93)"/>

  <!-- Arms raised (happy) -->
  <ellipse cx="19" cy="120" rx="17" ry="14" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2" transform="rotate(-20 19 120)"/>
  <ellipse cx="181" cy="120" rx="17" ry="14" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2" transform="rotate(20 181 120)"/>

  <!-- UwU happy eyes (arc style — thick curved stroke) -->
  <!-- Left eye: white base then dark arc -->
  <ellipse cx="78" cy="107" rx="20" ry="22" fill="white"/>
  <path d="M 59 109 Q 78 86 97 109" stroke="#2A1000" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Right eye -->
  <ellipse cx="122" cy="107" rx="20" ry="22" fill="white"/>
  <path d="M 103 109 Q 122 86 141 109" stroke="#2A1000" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Eye highlights on UwU eyes -->
  <circle cx="71" cy="100" r="5" fill="white"/>
  <circle cx="115" cy="100" r="5" fill="white"/>
  <circle cx="83" cy="108" r="2.5" fill="white"/>
  <circle cx="127" cy="108" r="2.5" fill="white"/>

  <!-- Nose -->
  <circle cx="100" cy="119" r="3.5" fill="#FF6B99"/>

  <!-- Big happy blush -->
  <ellipse cx="55" cy="128" rx="21" ry="13" fill="#FF90BE" opacity="0.38"/>
  <ellipse cx="145" cy="128" rx="21" ry="13" fill="#FF90BE" opacity="0.38"/>

  <!-- Wide happy smile -->
  <path d="M 76 135 Q 100 162 124 135" stroke="#E8305A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Sparkles -->
  <g transform="translate(26,36)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(174,30)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Floating hearts -->
  <path d="M 40 82 C 40 79 37 77 37 80 C 37 77 34 79 34 82 C 34 86 40 90 40 90 C 40 90 46 86 46 82 C 46 79 43 77 43 80 C 43 77 40 79 40 82 Z" fill="#FF6B99" opacity="0.65"/>
  <path d="M 157 74 C 157 71 154 69 154 72 C 154 69 151 71 151 74 C 151 78 157 82 157 82 C 157 82 163 78 163 74 C 163 71 160 69 160 72 C 160 69 157 71 157 74 Z" fill="#FF6B99" opacity="0.7"/>
  <circle cx="38" cy="60" r="3.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="164" cy="50" r="3" fill="#FFD700" opacity="0.75"/>
</svg>
