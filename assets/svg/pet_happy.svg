<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyH" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#FFE8F4"/>
      <stop offset="100%" stop-color="#FFB0D0"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="193" rx="54" ry="9" fill="#FFD700" opacity="0.16"/>

  <!-- Left ear -->
  <polygon points="44,88 88,83 64,16" fill="#FFB0CC"/>
  <polygon points="54,80 80,76 64,30" fill="#FFE0F0"/>
  <!-- Right ear -->
  <polygon points="156,88 112,83 136,16" fill="#FFB0CC"/>
  <polygon points="146,80 120,76 136,30" fill="#FFE0F0"/>

  <!-- Body (slightly bigger — happy bounce) -->
  <circle cx="100" cy="120" r="72" fill="url(#bodyH)"/>
  <circle cx="100" cy="120" r="72" fill="none" stroke="#FFB0CC" stroke-width="2.5"/>
  <!-- Body shine -->
  <ellipse cx="74" cy="94" rx="28" ry="18" fill="white" opacity="0.24" transform="rotate(-20 74 94)"/>

  <!-- Paws raised (happy) -->
  <ellipse cx="26" cy="140" rx="22" ry="13" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2" transform="rotate(-20 26 140)"/>
  <ellipse cx="174" cy="140" rx="22" ry="13" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2" transform="rotate(20 174 140)"/>

  <!-- Collar -->
  <path d="M 48 160 Q 100 174 152 160" stroke="#FF85B3" stroke-width="6" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="171" rx="8" ry="7" fill="#FFD700" stroke="#E8A000" stroke-width="1.5"/>
  <circle cx="100" cy="171" r="2.5" fill="#E8A000"/>

  <!-- Happy eyes: UwU arc style -->
  <ellipse cx="78" cy="108" rx="19" ry="21" fill="white"/>
  <path d="M 59 110 Q 78 87 97 110" stroke="#2A1000" stroke-width="15" fill="none" stroke-linecap="round"/>
  <ellipse cx="122" cy="108" rx="19" ry="21" fill="white"/>
  <path d="M 103 110 Q 122 87 141 110" stroke="#2A1000" stroke-width="15" fill="none" stroke-linecap="round"/>

  <!-- Eye highlights on UwU eyes -->
  <circle cx="70" cy="100" r="5" fill="white"/>
  <circle cx="114" cy="100" r="5" fill="white"/>
  <circle cx="83" cy="109" r="2.5" fill="white"/>
  <circle cx="127" cy="109" r="2.5" fill="white"/>

  <!-- Muzzle -->
  <ellipse cx="89" cy="123" rx="14" ry="10" fill="white" opacity="0.65"/>
  <ellipse cx="111" cy="123" rx="14" ry="10" fill="white" opacity="0.65"/>

  <!-- Cat nose -->
  <path d="M 96 117 L 104 117 L 100 124 Z" fill="#FF90A8"/>

  <!-- Wide happy cat mouth -->
  <line x1="100" y1="124" x2="100" y2="128" stroke="#D94070" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 84 138 Q 92 130 100 128 Q 108 130 116 138" stroke="#D94070" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="44" y1="116" x2="83" y2="120" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="44" y1="124" x2="83" y2="124" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="44" y1="132" x2="83" y2="128" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <!-- Whiskers right -->
  <line x1="117" y1="120" x2="156" y2="116" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="117" y1="124" x2="156" y2="124" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="117" y1="128" x2="156" y2="132" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>

  <!-- Big blush -->
  <ellipse cx="55" cy="129" rx="17" ry="11" fill="#FF90BE" opacity="0.38"/>
  <ellipse cx="145" cy="129" rx="17" ry="11" fill="#FF90BE" opacity="0.38"/>

  <!-- Sparkles -->
  <g transform="translate(24,34)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(176,30)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Floating hearts -->
  <path d="M 40 80 C 40 77 37 75 37 78 C 37 75 34 77 34 80 C 34 85 40 90 40 90 C 40 90 46 85 46 80 C 46 77 43 75 43 78 C 43 75 40 77 40 80 Z" fill="#FF6B99" opacity="0.7"/>
  <path d="M 158 72 C 158 69 155 67 155 70 C 155 67 152 69 152 72 C 152 77 158 82 158 82 C 158 82 164 77 164 72 C 164 69 161 67 161 70 C 161 67 158 69 158 72 Z" fill="#FF6B99" opacity="0.72"/>
</svg>
