<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyG" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#FFE8F4"/>
      <stop offset="100%" stop-color="#FFBCD8"/>
    </radialGradient>
    <radialGradient id="earG" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFD8EC"/>
      <stop offset="100%" stop-color="#FFB0CC"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="191" rx="50" ry="7" fill="#FF90BE" opacity="0.14"/>

  <!-- Left ear -->
  <ellipse cx="60" cy="52" rx="23" ry="27" fill="url(#earG)"/>
  <ellipse cx="60" cy="56" rx="13" ry="17" fill="#FFE8F8"/>
  <ellipse cx="56" cy="50" rx="5" ry="7" fill="white" opacity="0.28"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="52" rx="23" ry="27" fill="url(#earG)"/>
  <ellipse cx="140" cy="56" rx="13" ry="17" fill="#FFE8F8"/>
  <ellipse cx="136" cy="50" rx="5" ry="7" fill="white" opacity="0.28"/>

  <!-- Body -->
  <ellipse cx="100" cy="120" rx="73" ry="71" fill="url(#bodyG)"/>
  <ellipse cx="100" cy="120" rx="73" ry="71" fill="none" stroke="#FFB0CC" stroke-width="2"/>
  <!-- Body shine highlight -->
  <ellipse cx="76" cy="95" rx="28" ry="18" fill="white" opacity="0.2" transform="rotate(-22 76 95)"/>

  <!-- Left arm -->
  <ellipse cx="20" cy="128" rx="17" ry="14" fill="#FFBCD8" stroke="#FFB0CC" stroke-width="2"/>
  <!-- Right arm -->
  <ellipse cx="180" cy="128" rx="17" ry="14" fill="#FFBCD8" stroke="#FFB0CC" stroke-width="2"/>

  <!-- Left eye white -->
  <ellipse cx="78" cy="104" rx="20" ry="22" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="122" cy="104" rx="20" ry="22" fill="white"/>

  <!-- Left pupil -->
  <circle cx="79" cy="108" r="13" fill="#3A1800"/>
  <!-- Right pupil -->
  <circle cx="123" cy="108" r="13" fill="#3A1800"/>
  <!-- Pupil depth -->
  <circle cx="80" cy="110" r="7" fill="#5C2E00" opacity="0.45"/>
  <circle cx="124" cy="110" r="7" fill="#5C2E00" opacity="0.45"/>

  <!-- Eye highlights -->
  <circle cx="73" cy="101" r="5.5" fill="white"/>
  <circle cx="117" cy="101" r="5.5" fill="white"/>
  <circle cx="85" cy="114" r="2.5" fill="white"/>
  <circle cx="129" cy="114" r="2.5" fill="white"/>
  <!-- Tiny star cross -->
  <line x1="79" y1="105" x2="79" y2="113" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.32"/>
  <line x1="75" y1="109" x2="83" y2="109" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.32"/>

  <!-- Left eyelashes -->
  <path d="M 64 88 Q 60 80 57 74" stroke="#3A1800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 78 82 Q 76 74 74 68" stroke="#3A1800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 92 88 Q 96 81 99 76" stroke="#3A1800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right eyelashes -->
  <path d="M 108 88 Q 104 81 101 76" stroke="#3A1800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 122 82 Q 124 74 126 68" stroke="#3A1800" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 136 88 Q 140 80 143 74" stroke="#3A1800" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Heart nose -->
  <path d="M 100 124 C 97 122 92 118 92 115 C 92 112 96 110 100 114 C 104 110 108 112 108 115 C 108 118 103 122 100 124 Z" fill="#FF6B99"/>

  <!-- Blush cheeks -->
  <ellipse cx="57" cy="130" rx="20" ry="12" fill="#FF90BE" opacity="0.28"/>
  <ellipse cx="143" cy="130" rx="20" ry="12" fill="#FF90BE" opacity="0.28"/>
  <!-- Cheek shine -->
  <circle cx="50" cy="125" r="3" fill="white" opacity="0.38"/>
  <circle cx="136" cy="125" r="3" fill="white" opacity="0.38"/>

  <!-- Gentle smile -->
  <path d="M 84 136 Q 100 151 116 136" stroke="#E8305A" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Tiny sparkle dots -->
  <circle cx="166" cy="80" r="2.5" fill="#FFD0E8" opacity="0.7"/>
  <circle cx="34" cy="86" r="2" fill="#FFD0E8" opacity="0.55"/>
</svg>
