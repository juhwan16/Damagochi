<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyN" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#FFE8F4"/>
      <stop offset="100%" stop-color="#FFBCD8"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="191" rx="50" ry="7" fill="#FF90BE" opacity="0.15"/>

  <!-- Left ear -->
  <ellipse cx="62" cy="54" rx="22" ry="26" fill="#FFB8D0"/>
  <ellipse cx="62" cy="58" rx="12" ry="16" fill="#FFE0F4"/>
  <!-- Right ear -->
  <ellipse cx="138" cy="54" rx="22" ry="26" fill="#FFB8D0"/>
  <ellipse cx="138" cy="58" rx="12" ry="16" fill="#FFE0F4"/>

  <!-- Body -->
  <ellipse cx="100" cy="120" rx="72" ry="70" fill="url(#bodyN)"/>
  <ellipse cx="100" cy="120" rx="72" ry="70" fill="none" stroke="#FFB0CC" stroke-width="2.5"/>
  <!-- Body shine -->
  <ellipse cx="75" cy="96" rx="26" ry="16" fill="white" opacity="0.2" transform="rotate(-20 75 96)"/>

  <!-- Arms -->
  <ellipse cx="21" cy="130" rx="17" ry="14" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2"/>
  <ellipse cx="179" cy="130" rx="17" ry="14" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2"/>

  <!-- Left eye white -->
  <ellipse cx="78" cy="105" rx="19" ry="21" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="122" cy="105" rx="19" ry="21" fill="white"/>

  <!-- Left pupil -->
  <circle cx="79" cy="109" r="12" fill="#2A1000"/>
  <!-- Right pupil -->
  <circle cx="123" cy="109" r="12" fill="#2A1000"/>

  <!-- Highlights -->
  <circle cx="73" cy="103" r="5" fill="white"/>
  <circle cx="117" cy="103" r="5" fill="white"/>
  <circle cx="84" cy="115" r="2.5" fill="white"/>
  <circle cx="128" cy="115" r="2.5" fill="white"/>

  <!-- Nose (tiny pink dot) -->
  <circle cx="100" cy="121" r="3.5" fill="#FF6B99"/>

  <!-- Blush -->
  <ellipse cx="57" cy="130" rx="18" ry="11" fill="#FF90BE" opacity="0.3"/>
  <ellipse cx="143" cy="130" rx="18" ry="11" fill="#FF90BE" opacity="0.3"/>

  <!-- Gentle smile -->
  <path d="M 85 137 Q 100 151 115 137" stroke="#E8305A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
