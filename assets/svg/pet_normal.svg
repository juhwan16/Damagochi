<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- glow -->
  <circle cx="100" cy="115" r="80" fill="#FFE8F5" opacity="0.5"/>
  <!-- ear bumps -->
  <circle cx="55" cy="62" r="22" fill="#FFC4E0"/>
  <circle cx="145" cy="62" r="22" fill="#FFC4E0"/>
  <!-- body -->
  <ellipse cx="100" cy="120" rx="68" ry="63" fill="#FFD6EC"/>
  <ellipse cx="100" cy="120" rx="68" ry="63" fill="none" stroke="#FF8CC0" stroke-width="3"/>
  <!-- arms neutral -->
  <ellipse cx="35" cy="108" rx="16" ry="22" fill="#FFD6EC" stroke="#FF8CC0" stroke-width="2.5" transform="rotate(-10 35 108)"/>
  <ellipse cx="165" cy="108" rx="16" ry="22" fill="#FFD6EC" stroke="#FF8CC0" stroke-width="2.5" transform="rotate(10 165 108)"/>
  <!-- round eyes -->
  <circle cx="78" cy="107" r="13" fill="white"/>
  <circle cx="122" cy="107" r="13" fill="white"/>
  <circle cx="78" cy="107" r="8" fill="#3D1A00"/>
  <circle cx="122" cy="107" r="8" fill="#3D1A00"/>
  <circle cx="81" cy="104" r="3" fill="white"/>
  <circle cx="125" cy="104" r="3" fill="white"/>
  <!-- cheeks -->
  <ellipse cx="63" cy="126" rx="14" ry="8" fill="#FF8CC0" opacity="0.4"/>
  <ellipse cx="137" cy="126" rx="14" ry="8" fill="#FF8CC0" opacity="0.4"/>
  <!-- nose -->
  <circle cx="100" cy="118" r="3" fill="#FF8CC0"/>
  <!-- small smile -->
  <path d="M 82 132 Q 100 144 118 132" fill="none" stroke="#E8355A" stroke-width="3.5" stroke-linecap="round"/>
</svg>
