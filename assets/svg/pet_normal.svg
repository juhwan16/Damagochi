<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyN" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#FFF0F8"/>
      <stop offset="100%" stop-color="#FFBCD8"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="193" rx="52" ry="8" fill="#FF90BE" opacity="0.15"/>

  <!-- Left ear -->
  <polygon points="46,88 88,84 66,18" fill="#FFB8D0"/>
  <polygon points="56,80 80,78 66,32" fill="#FFE0F0"/>
  <!-- Right ear -->
  <polygon points="154,88 112,84 134,18" fill="#FFB8D0"/>
  <polygon points="144,80 120,78 134,32" fill="#FFE0F0"/>

  <!-- Body -->
  <circle cx="100" cy="122" r="70" fill="url(#bodyN)"/>
  <circle cx="100" cy="122" r="70" fill="none" stroke="#FFB0CC" stroke-width="2.5"/>
  <!-- Body shine -->
  <ellipse cx="74" cy="97" rx="26" ry="16" fill="white" opacity="0.22" transform="rotate(-20 74 97)"/>

  <!-- Left paw -->
  <ellipse cx="30" cy="152" rx="22" ry="13" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2"/>
  <!-- Right paw -->
  <ellipse cx="170" cy="152" rx="22" ry="13" fill="#FFCCE0" stroke="#FFB0CC" stroke-width="2"/>

  <!-- Collar -->
  <path d="M 50 162 Q 100 176 150 162" stroke="#FF85B3" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Bell -->
  <ellipse cx="100" cy="173" rx="8" ry="7" fill="#FFD700" stroke="#E8A000" stroke-width="1.5"/>
  <circle cx="100" cy="173" r="2.5" fill="#E8A000"/>

  <!-- Left eye white -->
  <ellipse cx="78" cy="107" rx="18" ry="20" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="122" cy="107" rx="18" ry="20" fill="white"/>

  <!-- Pupils -->
  <circle cx="79" cy="111" r="12" fill="#2A1000"/>
  <circle cx="123" cy="111" r="12" fill="#2A1000"/>

  <!-- Eye highlights -->
  <circle cx="73" cy="105" r="5" fill="white"/>
  <circle cx="117" cy="105" r="5" fill="white"/>
  <circle cx="84" cy="117" r="2.5" fill="white"/>
  <circle cx="128" cy="117" r="2.5" fill="white"/>

  <!-- Muzzle (cat puffy cheeks) -->
  <ellipse cx="89" cy="124" rx="14" ry="10" fill="white" opacity="0.65"/>
  <ellipse cx="111" cy="124" rx="14" ry="10" fill="white" opacity="0.65"/>

  <!-- Cat nose (inverted triangle) -->
  <path d="M 96 118 L 104 118 L 100 125 Z" fill="#FF90A8"/>

  <!-- Cat mouth -->
  <line x1="100" y1="125" x2="100" y2="129" stroke="#D94070" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 88 135 Q 94 131 100 129 Q 106 131 112 135" stroke="#D94070" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="46" y1="116" x2="84" y2="121" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="46" y1="124" x2="84" y2="124" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="46" y1="132" x2="84" y2="127" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <!-- Whiskers right -->
  <line x1="116" y1="121" x2="154" y2="116" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="116" y1="124" x2="154" y2="124" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>
  <line x1="116" y1="127" x2="154" y2="132" stroke="#CC90A8" stroke-width="1.5" opacity="0.6"/>

  <!-- Blush -->
  <ellipse cx="56" cy="130" rx="15" ry="9" fill="#FF90BE" opacity="0.3"/>
  <ellipse cx="144" cy="130" rx="15" ry="9" fill="#FF90BE" opacity="0.3"/>
</svg>
