<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ground shadow -->
  <ellipse cx="100" cy="191" rx="50" ry="7" fill="#FF90BE" opacity="0.14"/>

  <!-- Left ear -->
  <ellipse cx="60" cy="52" rx="23" ry="27" fill="#FFC0DC"/>
  <ellipse cx="60" cy="56" rx="13" ry="17" fill="#FFE8F8"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="52" rx="23" ry="27" fill="#FFC0DC"/>
  <ellipse cx="140" cy="56" rx="13" ry="17" fill="#FFE8F8"/>

  <!-- Body -->
  <ellipse cx="100" cy="120" rx="73" ry="71" fill="#FFD0E8"/>
  <ellipse cx="100" cy="120" rx="73" ry="71" fill="none" stroke="#FF90BE" stroke-width="2.5"/>

  <!-- Left arm -->
  <ellipse cx="20" cy="128" rx="17" ry="14" fill="#FFD0E8" stroke="#FF90BE" stroke-width="2.5"/>
  <!-- Right arm -->
  <ellipse cx="180" cy="128" rx="17" ry="14" fill="#FFD0E8" stroke="#FF90BE" stroke-width="2.5"/>

  <!-- Left eye white -->
  <ellipse cx="78" cy="104" rx="20" ry="22" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="122" cy="104" rx="20" ry="22" fill="white"/>

  <!-- Left pupil -->
  <circle cx="79" cy="108" r="13" fill="#3A1800"/>
  <!-- Right pupil -->
  <circle cx="123" cy="108" r="13" fill="#3A1800"/>

  <!-- Eye shine big -->
  <circle cx="73" cy="101" r="5.5" fill="white"/>
  <circle cx="117" cy="101" r="5.5" fill="white"/>
  <!-- Eye shine small -->
  <circle cx="85" cy="114" r="2.5" fill="white"/>
  <circle cx="129" cy="114" r="2.5" fill="white"/>

  <!-- Nose -->
  <circle cx="100" cy="120" r="4" fill="#FF6B99"/>

  <!-- Blush -->
  <ellipse cx="57" cy="129" rx="20" ry="12" fill="#FF90BE" opacity="0.28"/>
  <ellipse cx="143" cy="129" rx="20" ry="12" fill="#FF90BE" opacity="0.28"/>

  <!-- Mouth gentle smile -->
  <path d="M 84 136 Q 100 151 116 136" stroke="#E8305A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
