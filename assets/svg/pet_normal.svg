<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="188" rx="48" ry="8" fill="#CC88AA" opacity="0.2"/>

  <!-- Body (chubby egg shape) -->
  <ellipse cx="100" cy="112" rx="68" ry="72" fill="#FFD0E8"/>
  <ellipse cx="100" cy="112" rx="68" ry="72" fill="none" stroke="#FFB0CC" stroke-width="3"/>

  <!-- Body shine -->
  <ellipse cx="76" cy="82" rx="22" ry="14" fill="white" opacity="0.25" transform="rotate(-18 76 82)"/>

  <!-- Left eye -->
  <circle cx="78" cy="104" r="16" fill="white"/>
  <circle cx="80" cy="107" r="10" fill="#1A0800"/>
  <circle cx="75" cy="102" r="4.5" fill="white"/>
  <circle cx="86" cy="113" r="2" fill="white"/>

  <!-- Right eye -->
  <circle cx="122" cy="104" r="16" fill="white"/>
  <circle cx="124" cy="107" r="10" fill="#1A0800"/>
  <circle cx="119" cy="102" r="4.5" fill="white"/>
  <circle cx="130" cy="113" r="2" fill="white"/>

  <!-- Blush -->
  <ellipse cx="60" cy="120" rx="14" ry="9" fill="#FF90BE" opacity="0.35"/>
  <ellipse cx="140" cy="120" rx="14" ry="9" fill="#FF90BE" opacity="0.35"/>

  <!-- Nose -->
  <circle cx="100" cy="119" r="3" fill="#FF80A8"/>

  <!-- Smile -->
  <path d="M 86 130 Q 100 143 114 130" stroke="#CC3366" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
