<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="188" rx="46" ry="7" fill="#9988AA" opacity="0.18"/>

  <!-- Body (pale purple) -->
  <ellipse cx="100" cy="114" rx="68" ry="72" fill="#D8D0EC"/>
  <ellipse cx="100" cy="114" rx="68" ry="72" fill="none" stroke="#B8B0CC" stroke-width="3"/>

  <!-- Body shine -->
  <ellipse cx="76" cy="84" rx="20" ry="13" fill="white" opacity="0.14" transform="rotate(-18 76 84)"/>

  <!-- Left eye white -->
  <circle cx="78" cy="104" r="16" fill="white" opacity="0.9"/>
  <!-- X eye left -->
  <line x1="65" y1="93" x2="89" y2="117" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <line x1="89" y1="93" x2="65" y2="117" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>

  <!-- Right eye white -->
  <circle cx="122" cy="104" r="16" fill="white" opacity="0.9"/>
  <!-- X eye right -->
  <line x1="109" y1="93" x2="133" y2="117" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <line x1="133" y1="93" x2="109" y2="117" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>

  <!-- Blush (faint) -->
  <ellipse cx="60" cy="122" rx="13" ry="8" fill="#9988AA" opacity="0.18"/>
  <ellipse cx="140" cy="122" rx="13" ry="8" fill="#9988AA" opacity="0.18"/>

  <!-- Nose -->
  <circle cx="100" cy="120" r="3" fill="#9988AA"/>

  <!-- Wavy sick mouth -->
  <path d="M 84 134 C 90 127 96 141 100 134 C 104 127 110 141 116 134" stroke="#7755AA" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Sweat drops -->
  <path d="M 148 72 C 143 64 141 78 148 84 C 155 78 153 64 148 72 Z" fill="#AAD8F0"/>
  <path d="M 162 87 C 158 81 156 90 162 95 C 168 90 166 81 162 87 Z" fill="#AAD8F0"/>

  <!-- Fever sparks -->
  <g transform="translate(30,46)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#CC99EE" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#CC99EE" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
