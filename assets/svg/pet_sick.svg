<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ground shadow -->
  <ellipse cx="100" cy="191" rx="48" ry="7" fill="#9888A8" opacity="0.12"/>

  <!-- Left ear -->
  <ellipse cx="60" cy="52" rx="23" ry="27" fill="#B0A0C4"/>
  <ellipse cx="60" cy="56" rx="13" ry="17" fill="#E0D8F4"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="52" rx="23" ry="27" fill="#B0A0C4"/>
  <ellipse cx="140" cy="56" rx="13" ry="17" fill="#E0D8F4"/>

  <!-- Body (slightly slumped) -->
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="#C8C0D8"/>
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="none" stroke="#9888A8" stroke-width="2.5"/>

  <!-- Arms drooping down -->
  <ellipse cx="20" cy="136" rx="17" ry="13" fill="#C8C0D8" stroke="#9888A8" stroke-width="2.5"/>
  <ellipse cx="180" cy="136" rx="17" ry="13" fill="#C8C0D8" stroke="#9888A8" stroke-width="2.5"/>

  <!-- Eye whites -->
  <ellipse cx="78" cy="104" rx="20" ry="22" fill="white" opacity="0.88"/>
  <ellipse cx="122" cy="104" rx="20" ry="22" fill="white" opacity="0.88"/>

  <!-- X eyes left -->
  <line x1="64" y1="92" x2="90" y2="118" stroke="#3A1800" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="90" y1="92" x2="64" y2="118" stroke="#3A1800" stroke-width="6.5" stroke-linecap="round"/>
  <!-- X eyes right -->
  <line x1="110" y1="92" x2="136" y2="118" stroke="#3A1800" stroke-width="6.5" stroke-linecap="round"/>
  <line x1="136" y1="92" x2="110" y2="118" stroke="#3A1800" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="100" cy="122" r="4" fill="#9888A8"/>

  <!-- Faint cheeks -->
  <ellipse cx="57" cy="130" rx="18" ry="11" fill="#9888A8" opacity="0.15"/>
  <ellipse cx="143" cy="130" rx="18" ry="11" fill="#9888A8" opacity="0.15"/>

  <!-- Wavy sick mouth -->
  <path d="M 80 142 C 87 135 93 149 100 142 C 107 135 113 149 120 142" stroke="#6B4A80" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Sweat drops -->
  <path d="M 150 68 C 144 60 142 74 150 80 C 158 74 156 60 150 68 Z" fill="#A8D8F0"/>
  <path d="M 164 83 C 159 77 157 87 164 92 C 171 87 169 77 164 83 Z" fill="#A8D8F0"/>
  <path d="M 145 86 C 141 81 140 89 145 93 C 150 89 149 81 145 86 Z" fill="#A8D8F0"/>

  <!-- Fever sparkles -->
  <g transform="translate(26,42)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#D4A0E0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#D4A0E0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#D4A0E0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#D4A0E0" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(172,38)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#D4A0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#D4A0E0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#D4A0E0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#D4A0E0" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
