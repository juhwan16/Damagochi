<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyS" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#DAD4E8"/>
      <stop offset="100%" stop-color="#B4ACCC"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="191" rx="48" ry="7" fill="#9888A8" opacity="0.13"/>

  <!-- Ears -->
  <ellipse cx="62" cy="54" rx="22" ry="26" fill="#B0A8C4"/>
  <ellipse cx="62" cy="58" rx="12" ry="16" fill="#DED8F0"/>
  <ellipse cx="138" cy="54" rx="22" ry="26" fill="#B0A8C4"/>
  <ellipse cx="138" cy="58" rx="12" ry="16" fill="#DED8F0"/>

  <!-- Body -->
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="url(#bodyS)"/>
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="none" stroke="#9888A8" stroke-width="2.5"/>
  <!-- Dim body shine -->
  <ellipse cx="75" cy="97" rx="24" ry="15" fill="white" opacity="0.1" transform="rotate(-20 75 97)"/>

  <!-- Arms drooping down -->
  <ellipse cx="21" cy="136" rx="17" ry="13" fill="#C0B8D4" stroke="#9888A8" stroke-width="2"/>
  <ellipse cx="179" cy="136" rx="17" ry="13" fill="#C0B8D4" stroke="#9888A8" stroke-width="2"/>

  <!-- Eye whites -->
  <ellipse cx="78" cy="105" rx="19" ry="21" fill="white" opacity="0.9"/>
  <ellipse cx="122" cy="105" rx="19" ry="21" fill="white" opacity="0.9"/>

  <!-- X eyes — clean and simple -->
  <line x1="64" y1="93" x2="90" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>
  <line x1="90" y1="93" x2="64" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>
  <line x1="110" y1="93" x2="136" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>
  <line x1="136" y1="93" x2="110" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="100" cy="122" r="3.5" fill="#9888A8"/>

  <!-- Faint blush -->
  <ellipse cx="57" cy="131" rx="18" ry="11" fill="#9888A8" opacity="0.16"/>
  <ellipse cx="143" cy="131" rx="18" ry="11" fill="#9888A8" opacity="0.16"/>

  <!-- Wavy sick mouth -->
  <path d="M 81 141 C 88 134 94 148 100 141 C 106 134 112 148 119 141" stroke="#6B4A80" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Sweat drops -->
  <path d="M 150 70 C 145 62 143 76 150 82 C 157 76 155 62 150 70 Z" fill="#B8DCF0"/>
  <path d="M 163 85 C 159 79 157 88 163 93 C 169 88 167 79 163 85 Z" fill="#B8DCF0"/>

  <!-- Fever sparkles (small, subtle) -->
  <g transform="translate(28,44)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#C8A0D8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#C8A0D8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(170,40)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C8A0D8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#C8A0D8" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
