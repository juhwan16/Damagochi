<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="192" rx="48" ry="7" fill="#806000" opacity="0.16"/>

  <!-- Wings (limp) -->
  <ellipse cx="22" cy="154" rx="18" ry="24" fill="#E8D060" stroke="#B8A030" stroke-width="2" transform="rotate(2 22 154)"/>
  <ellipse cx="178" cy="154" rx="18" ry="24" fill="#E8D060" stroke="#B8A030" stroke-width="2" transform="rotate(-2 178 154)"/>

  <!-- Main duck body (pale/sickly) -->
  <ellipse cx="100" cy="118" rx="70" ry="74" fill="#E8D878"/>
  <ellipse cx="100" cy="118" rx="70" ry="74" fill="none" stroke="#B8A840" stroke-width="2.5"/>

  <!-- Body shine -->
  <ellipse cx="72" cy="82" rx="20" ry="13" fill="white" opacity="0.16" transform="rotate(-18 72 82)"/>

  <!-- Sick X eyes -->
  <circle cx="76" cy="108" r="22" fill="white" opacity="0.9"/>
  <line x1="60" y1="93" x2="92" y2="123" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <line x1="92" y1="93" x2="60" y2="123" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <circle cx="124" cy="108" r="22" fill="white" opacity="0.9"/>
  <line x1="108" y1="93" x2="140" y2="123" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <line x1="140" y1="93" x2="108" y2="123" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>

  <!-- Sick droopy beak -->
  <ellipse cx="100" cy="136" rx="18" ry="11" fill="#D07000"/>
  <path d="M 84 134 C 90 141 110 141 116 134" stroke="#A05000" stroke-width="1.5" fill="none"/>

  <!-- Sweat drops -->
  <path d="M 154 56 C 149 48 147 62 154 68 C 161 62 159 48 154 56 Z" fill="#AAD8F0"/>
  <path d="M 168 74 C 164 68 162 77 168 82 C 174 77 172 68 168 74 Z" fill="#AAD8F0"/>

  <!-- Fever sparks -->
  <g transform="translate(30,48)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#CC9900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#CC9900" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(18,68)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#CC9900" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#CC9900" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
