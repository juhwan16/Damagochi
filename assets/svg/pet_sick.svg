<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="192" rx="48" ry="7" fill="#1A1A10" opacity="0.18"/>

  <!-- Body (plate carrier, pale/sickly tint) -->
  <ellipse cx="100" cy="138" rx="66" ry="58" fill="#7A7868"/>
  <ellipse cx="100" cy="138" rx="66" ry="58" fill="none" stroke="#5C5A50" stroke-width="2.5"/>
  <!-- Front plate panel -->
  <rect x="68" y="108" width="64" height="58" rx="10" fill="#6A6858"/>
  <!-- MOLLE webbing lines -->
  <line x1="70" y1="120" x2="130" y2="120" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <line x1="70" y1="130" x2="130" y2="130" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <line x1="70" y1="140" x2="130" y2="140" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <line x1="70" y1="150" x2="130" y2="150" stroke="#4C4840" stroke-width="2" opacity="0.65"/>
  <!-- Admin pouch -->
  <rect x="80" y="154" width="40" height="12" rx="5" fill="#58523E"/>

  <!-- Arms -->
  <ellipse cx="26" cy="132" rx="20" ry="13" fill="#7A7868" stroke="#5C5A50" stroke-width="2"/>
  <ellipse cx="174" cy="132" rx="20" ry="13" fill="#7A7868" stroke="#5C5A50" stroke-width="2"/>

  <!-- Neck / balaclava -->
  <ellipse cx="100" cy="108" rx="34" ry="16" fill="#1E1E1E"/>

  <!-- Helmet (FAST-style) -->
  <ellipse cx="100" cy="60" rx="62" ry="54" fill="#242424"/>
  <!-- Helmet lower brim -->
  <rect x="40" y="98" width="120" height="12" rx="5" fill="#1A1A1A"/>

  <!-- Goggle bridge -->
  <rect x="88" y="82" width="24" height="10" rx="5" fill="#141414"/>

  <!-- Left goggle -->
  <circle cx="74" cy="87" r="19" fill="#141414"/>
  <circle cx="74" cy="87" r="14" fill="#B88C14"/>
  <!-- X mark left -->
  <line x1="63" y1="76" x2="85" y2="98" stroke="#1A0800" stroke-width="5" stroke-linecap="round"/>
  <line x1="85" y1="76" x2="63" y2="98" stroke="#1A0800" stroke-width="5" stroke-linecap="round"/>

  <!-- Right goggle -->
  <circle cx="126" cy="87" r="19" fill="#141414"/>
  <circle cx="126" cy="87" r="14" fill="#B88C14"/>
  <!-- X mark right -->
  <line x1="115" y1="76" x2="137" y2="98" stroke="#1A0800" stroke-width="5" stroke-linecap="round"/>
  <line x1="137" y1="76" x2="115" y2="98" stroke="#1A0800" stroke-width="5" stroke-linecap="round"/>

  <!-- NVG mount on helmet -->
  <rect x="88" y="16" width="24" height="14" rx="5" fill="#1A1A1A"/>
  <rect x="94" y="13" width="12" height="7" rx="3" fill="#141414"/>

  <!-- Wavy sick mouth -->
  <path d="M 85 113 C 91 107 96 119 100 113 C 104 107 109 119 115 113" stroke="#6A4820" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Sweat drops -->
  <path d="M 152 50 C 147 42 145 56 152 62 C 159 56 157 42 152 50 Z" fill="#AAD8F0"/>
  <path d="M 166 68 C 162 62 160 71 166 76 C 172 71 170 62 166 68 Z" fill="#AAD8F0"/>

  <!-- Fever sparks -->
  <g transform="translate(30,38)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#CC9900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#CC9900" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(18,58)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#CC9900" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#CC9900" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
