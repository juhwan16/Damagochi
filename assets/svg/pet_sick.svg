<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyS" cx="35%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#E0D8F0"/>
      <stop offset="100%" stop-color="#B8B0CC"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="193" rx="50" ry="7" fill="#9888A8" opacity="0.13"/>

  <!-- Left ear -->
  <polygon points="46,90 88,86 66,20" fill="#B0A8C4"/>
  <polygon points="56,82 80,80 66,36" fill="#DED8F0"/>
  <!-- Right ear -->
  <polygon points="154,90 112,86 134,20" fill="#B0A8C4"/>
  <polygon points="144,82 120,80 134,36" fill="#DED8F0"/>

  <!-- Body -->
  <circle cx="100" cy="122" r="70" fill="url(#bodyS)"/>
  <circle cx="100" cy="122" r="70" fill="none" stroke="#9888A8" stroke-width="2.5"/>
  <ellipse cx="74" cy="97" rx="22" ry="13" fill="white" opacity="0.1" transform="rotate(-20 74 97)"/>

  <!-- Paws drooping down -->
  <ellipse cx="30" cy="160" rx="22" ry="13" fill="#C0B8D4" stroke="#9888A8" stroke-width="2"/>
  <ellipse cx="170" cy="160" rx="22" ry="13" fill="#C0B8D4" stroke="#9888A8" stroke-width="2"/>

  <!-- Collar (pale) -->
  <path d="M 50 162 Q 100 176 150 162" stroke="#9888A8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="173" rx="8" ry="7" fill="#C0B8D0" stroke="#9888A8" stroke-width="1.5"/>
  <circle cx="100" cy="173" r="2.5" fill="#9888A8"/>

  <!-- Eye whites -->
  <ellipse cx="78" cy="107" rx="18" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="122" cy="107" rx="18" ry="20" fill="white" opacity="0.9"/>

  <!-- X eyes -->
  <line x1="64" y1="95" x2="90" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>
  <line x1="90" y1="95" x2="64" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>
  <line x1="110" y1="95" x2="136" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>
  <line x1="136" y1="95" x2="110" y2="119" stroke="#2A1000" stroke-width="7" stroke-linecap="round"/>

  <!-- Muzzle -->
  <ellipse cx="89" cy="124" rx="14" ry="10" fill="white" opacity="0.55"/>
  <ellipse cx="111" cy="124" rx="14" ry="10" fill="white" opacity="0.55"/>

  <!-- Cat nose (pale) -->
  <path d="M 96 118 L 104 118 L 100 125 Z" fill="#9888A8"/>

  <!-- Wavy sick mouth -->
  <line x1="100" y1="125" x2="100" y2="129" stroke="#6B4A80" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 86 139 C 91 133 96 143 100 137 C 104 131 109 141 114 135" stroke="#6B4A80" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="46" y1="116" x2="83" y2="121" stroke="#9888A8" stroke-width="1.5" opacity="0.5"/>
  <line x1="46" y1="124" x2="83" y2="124" stroke="#9888A8" stroke-width="1.5" opacity="0.5"/>
  <line x1="46" y1="132" x2="83" y2="127" stroke="#9888A8" stroke-width="1.5" opacity="0.5"/>
  <!-- Whiskers right -->
  <line x1="117" y1="121" x2="154" y2="116" stroke="#9888A8" stroke-width="1.5" opacity="0.5"/>
  <line x1="117" y1="124" x2="154" y2="124" stroke="#9888A8" stroke-width="1.5" opacity="0.5"/>
  <line x1="117" y1="127" x2="154" y2="132" stroke="#9888A8" stroke-width="1.5" opacity="0.5"/>

  <!-- Faint blush -->
  <ellipse cx="56" cy="130" rx="15" ry="9" fill="#9888A8" opacity="0.18"/>
  <ellipse cx="144" cy="130" rx="15" ry="9" fill="#9888A8" opacity="0.18"/>

  <!-- Sweat drops -->
  <path d="M 150 70 C 145 62 143 76 150 82 C 157 76 155 62 150 70 Z" fill="#B8DCF0"/>
  <path d="M 163 86 C 159 80 157 89 163 94 C 169 89 167 80 163 86 Z" fill="#B8DCF0"/>

  <!-- Fever sparkles -->
  <g transform="translate(28,44)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#C8A0D8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#C8A0D8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(170,40)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C8A0D8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#C8A0D8" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
