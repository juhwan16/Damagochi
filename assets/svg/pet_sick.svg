<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="192" rx="48" ry="7" fill="#806000" opacity="0.16"/>

  <!-- Wings (limp) -->
  <ellipse cx="22" cy="158" rx="18" ry="24" fill="#E8D060" stroke="#B8A030" stroke-width="2" transform="rotate(2 22 158)"/>
  <ellipse cx="178" cy="158" rx="18" ry="24" fill="#E8D060" stroke="#B8A030" stroke-width="2" transform="rotate(-2 178 158)"/>

  <!-- Main duck body (pale/sickly tint) -->
  <ellipse cx="100" cy="120" rx="70" ry="74" fill="#E8D878"/>
  <ellipse cx="100" cy="120" rx="70" ry="74" fill="none" stroke="#B8A840" stroke-width="2.5"/>

  <!-- Body shine -->
  <ellipse cx="72" cy="84" rx="20" ry="13" fill="white" opacity="0.16" transform="rotate(-18 72 84)"/>

  <!-- Tactical plate carrier -->
  <rect x="30" y="148" width="140" height="44" rx="14" fill="#2C2A26"/>
  <rect x="68" y="152" width="64" height="40" rx="10" fill="#1E1C18"/>
  <line x1="70" y1="163" x2="130" y2="163" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <line x1="70" y1="173" x2="130" y2="173" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <line x1="70" y1="183" x2="130" y2="183" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <rect x="82" y="186" width="36" height="10" rx="4" fill="#28261E"/>

  <!-- Tactical helmet -->
  <ellipse cx="100" cy="50" rx="62" ry="50" fill="#242424"/>
  <rect x="44" y="76" width="112" height="18" rx="9" fill="#1A1A1A"/>
  <ellipse cx="76" cy="85" rx="20" ry="11" fill="#141414"/>
  <ellipse cx="76" cy="85" rx="15" ry="8" fill="#B88C14"/>
  <ellipse cx="69" cy="81" rx="5" ry="3" fill="white" opacity="0.2"/>
  <ellipse cx="124" cy="85" rx="20" ry="11" fill="#141414"/>
  <ellipse cx="124" cy="85" rx="15" ry="8" fill="#B88C14"/>
  <ellipse cx="117" cy="81" rx="5" ry="3" fill="white" opacity="0.2"/>
  <rect x="38" y="90" width="124" height="11" rx="5" fill="#1A1A1A"/>
  <rect x="88" y="14" width="24" height="14" rx="5" fill="#1A1A1A"/>
  <rect x="94" y="11" width="12" height="7" rx="3" fill="#141414"/>

  <!-- Sick X eyes -->
  <circle cx="76" cy="112" r="20" fill="white" opacity="0.9"/>
  <line x1="62" y1="99" x2="90" y2="125" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <line x1="90" y1="99" x2="62" y2="125" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <circle cx="124" cy="112" r="20" fill="white" opacity="0.9"/>
  <line x1="110" y1="99" x2="138" y2="125" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>
  <line x1="138" y1="99" x2="110" y2="125" stroke="#1A0800" stroke-width="7" stroke-linecap="round"/>

  <!-- Sick droopy beak -->
  <ellipse cx="100" cy="137" rx="16" ry="10" fill="#D07000"/>
  <path d="M 86 135 C 92 142 108 142 114 135" stroke="#A05000" stroke-width="1.5" fill="none"/>

  <!-- Sweat drops -->
  <path d="M 152 52 C 147 44 145 58 152 64 C 159 58 157 44 152 52 Z" fill="#AAD8F0"/>
  <path d="M 166 70 C 162 64 160 73 166 78 C 172 73 170 64 166 70 Z" fill="#AAD8F0"/>

  <!-- Fever sparks -->
  <g transform="translate(30,40)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#CC9900" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#CC9900" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(18,60)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#CC9900" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#CC9900" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
