<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyT" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#EEDAE8"/>
      <stop offset="100%" stop-color="#D8AABB"/>
    </radialGradient>
    <radialGradient id="earT" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#E0C0D4"/>
      <stop offset="100%" stop-color="#C8A0B8"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="191" rx="48" ry="7" fill="#C090A8" opacity="0.12"/>

  <!-- Left ear (slightly drooped) -->
  <ellipse cx="60" cy="54" rx="23" ry="27" fill="url(#earT)"/>
  <ellipse cx="60" cy="58" rx="13" ry="17" fill="#F0D8EC"/>
  <ellipse cx="56" cy="52" rx="5" ry="6" fill="white" opacity="0.2"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="54" rx="23" ry="27" fill="url(#earT)"/>
  <ellipse cx="140" cy="58" rx="13" ry="17" fill="#F0D8EC"/>
  <ellipse cx="136" cy="52" rx="5" ry="6" fill="white" opacity="0.2"/>

  <!-- Body (slightly slouched) -->
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="url(#bodyT)"/>
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="none" stroke="#C0A0B0" stroke-width="2"/>
  <!-- Dim body shine -->
  <ellipse cx="76" cy="97" rx="26" ry="16" fill="white" opacity="0.12" transform="rotate(-22 76 97)"/>

  <!-- Arms drooping down -->
  <ellipse cx="20" cy="134" rx="17" ry="13" fill="#D8AABB" stroke="#C0A0B0" stroke-width="2"/>
  <ellipse cx="180" cy="134" rx="17" ry="13" fill="#D8AABB" stroke="#C0A0B0" stroke-width="2"/>

  <!-- Eye whites -->
  <ellipse cx="78" cy="106" rx="20" ry="22" fill="white"/>
  <ellipse cx="122" cy="106" rx="20" ry="22" fill="white"/>

  <!-- Pupils shifted downward (droopy) -->
  <circle cx="78" cy="115" r="13" fill="#3A1800"/>
  <circle cx="122" cy="115" r="13" fill="#3A1800"/>
  <!-- Dim highlights -->
  <circle cx="73" cy="111" r="4" fill="white" opacity="0.65"/>
  <circle cx="117" cy="111" r="4" fill="white" opacity="0.65"/>

  <!-- Eyelid overlay (half-closes eyes — matches body color) -->
  <ellipse cx="78" cy="96" rx="22" ry="15" fill="#DEB8C8"/>
  <ellipse cx="122" cy="96" rx="22" ry="15" fill="#DEB8C8"/>
  <!-- Eyelid drooping curve -->
  <path d="M 56 96 Q 78 108 100 96" stroke="#C0A0B0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 96 Q 122 108 144 96" stroke="#C0A0B0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Heart nose (muted) -->
  <path d="M 100 124 C 97 122 92 118 92 115 C 92 112 96 110 100 114 C 104 110 108 112 108 115 C 108 118 103 122 100 124 Z" fill="#C090A8"/>

  <!-- Faint cheeks -->
  <ellipse cx="57" cy="131" rx="19" ry="11" fill="#C090A8" opacity="0.2"/>
  <ellipse cx="143" cy="131" rx="19" ry="11" fill="#C090A8" opacity="0.2"/>

  <!-- Tired flat mouth -->
  <path d="M 86 138 Q 100 133 114 138" stroke="#8B4C6A" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Sweat drop -->
  <path d="M 148 72 C 142 64 140 78 148 84 C 156 78 154 64 148 72 Z" fill="#A8D8F0"/>

  <!-- ZZZ sleep (path-based Z shapes) -->
  <path d="M 154 56 L 163 56 L 154 67 L 163 67" stroke="#A8D8F0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 162 40 L 174 40 L 162 54 L 174 54" stroke="#A8D8F0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 172 22 L 187 22 L 172 39 L 187 39" stroke="#A8D8F0" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
