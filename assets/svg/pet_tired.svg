<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow -->
  <ellipse cx="100" cy="192" rx="50" ry="8" fill="#806000" opacity="0.18"/>

  <!-- Wings (drooped) -->
  <ellipse cx="22" cy="156" rx="19" ry="26" fill="#F0D000" stroke="#C0A000" stroke-width="2" transform="rotate(5 22 156)"/>
  <ellipse cx="178" cy="156" rx="19" ry="26" fill="#F0D000" stroke="#C0A000" stroke-width="2" transform="rotate(-5 178 156)"/>

  <!-- Main duck body (slightly duller) -->
  <ellipse cx="100" cy="120" rx="70" ry="74" fill="#F0D200"/>
  <ellipse cx="100" cy="120" rx="70" ry="74" fill="none" stroke="#C0A000" stroke-width="2.5"/>

  <!-- Body shine -->
  <ellipse cx="72" cy="84" rx="20" ry="13" fill="white" opacity="0.18" transform="rotate(-18 72 84)"/>

  <!-- Tactical plate carrier -->
  <rect x="30" y="148" width="140" height="44" rx="14" fill="#2C2A26"/>
  <rect x="68" y="152" width="64" height="40" rx="10" fill="#1E1C18"/>
  <line x1="70" y1="163" x2="130" y2="163" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <line x1="70" y1="173" x2="130" y2="173" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <line x1="70" y1="183" x2="130" y2="183" stroke="#3A3830" stroke-width="2" opacity="0.9"/>
  <rect x="82" y="186" width="36" height="10" rx="4" fill="#28261E"/>

  <!-- Tactical helmet -->
  <ellipse cx="100" cy="50" rx="62" ry="50" fill="#242424"/>
  <rect x="44" y="76" width="112" height="18" rx="9" fill="#1A1A1A"/>
  <ellipse cx="76" cy="85" rx="20" ry="11" fill="#141414"/>
  <ellipse cx="76" cy="85" rx="15" ry="8" fill="#B88C14"/>
  <ellipse cx="69" cy="81" rx="5" ry="3" fill="white" opacity="0.25"/>
  <ellipse cx="124" cy="85" rx="20" ry="11" fill="#141414"/>
  <ellipse cx="124" cy="85" rx="15" ry="8" fill="#B88C14"/>
  <ellipse cx="117" cy="81" rx="5" ry="3" fill="white" opacity="0.25"/>
  <rect x="38" y="90" width="124" height="11" rx="5" fill="#1A1A1A"/>
  <rect x="88" y="14" width="24" height="14" rx="5" fill="#1A1A1A"/>
  <rect x="94" y="11" width="12" height="7" rx="3" fill="#141414"/>

  <!-- Duck eyes (half-closed) -->
  <circle cx="76" cy="112" r="20" fill="white"/>
  <circle cx="79" cy="116" r="12" fill="#1A0800"/>
  <circle cx="70" cy="108" r="5" fill="white" opacity="0.7"/>
  <!-- Sleepy eyelid left -->
  <ellipse cx="76" cy="102" rx="22" ry="13" fill="#F0D200"/>
  <path d="M 56 102 Q 76 114 96 102" stroke="#C0A000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="124" cy="112" r="20" fill="white"/>
  <circle cx="127" cy="116" r="12" fill="#1A0800"/>
  <circle cx="118" cy="108" r="5" fill="white" opacity="0.7"/>
  <!-- Sleepy eyelid right -->
  <ellipse cx="124" cy="102" rx="22" ry="13" fill="#F0D200"/>
  <path d="M 104 102 Q 124 114 144 102" stroke="#C0A000" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Flat tired beak -->
  <ellipse cx="100" cy="136" rx="16" ry="9" fill="#E07800"/>
  <path d="M 86 136 Q 100 133 114 136" stroke="#B05800" stroke-width="1.5" fill="none"/>

  <!-- Sweat drop -->
  <path d="M 152 52 C 147 44 145 58 152 64 C 159 58 157 44 152 52 Z" fill="#AAD8F0"/>

  <!-- ZZZ -->
  <path d="M 154 68 L 163 68 L 154 78 L 163 78" stroke="#99C8E0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 162 50 L 174 50 L 162 63 L 174 63" stroke="#99C8E0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 172 28 L 186 28 L 172 44 L 186 44" stroke="#99C8E0" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
