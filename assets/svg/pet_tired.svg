<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Ground shadow -->
  <ellipse cx="100" cy="191" rx="48" ry="7" fill="#C090A8" opacity="0.12"/>

  <!-- Left ear -->
  <ellipse cx="60" cy="52" rx="23" ry="27" fill="#D0A8BC"/>
  <ellipse cx="60" cy="56" rx="13" ry="17" fill="#F0D8EC"/>
  <!-- Right ear -->
  <ellipse cx="140" cy="52" rx="23" ry="27" fill="#D0A8BC"/>
  <ellipse cx="140" cy="56" rx="13" ry="17" fill="#F0D8EC"/>

  <!-- Body (slightly slouched) -->
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="#DEB8CC"/>
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="none" stroke="#C090A8" stroke-width="2.5"/>

  <!-- Arms drooping -->
  <ellipse cx="20" cy="134" rx="17" ry="13" fill="#DEB8CC" stroke="#C090A8" stroke-width="2.5"/>
  <ellipse cx="180" cy="134" rx="17" ry="13" fill="#DEB8CC" stroke="#C090A8" stroke-width="2.5"/>

  <!-- Eye whites -->
  <ellipse cx="78" cy="106" rx="20" ry="22" fill="white"/>
  <ellipse cx="122" cy="106" rx="20" ry="22" fill="white"/>

  <!-- Pupils shifted down (drooping) -->
  <circle cx="78" cy="114" r="13" fill="#3A1800"/>
  <circle cx="122" cy="114" r="13" fill="#3A1800"/>

  <!-- Dim highlights -->
  <circle cx="73" cy="109" r="4" fill="white" opacity="0.7"/>
  <circle cx="117" cy="109" r="4" fill="white" opacity="0.7"/>

  <!-- Eyelid overlay (half closes the eyes - matches body color) -->
  <ellipse cx="78" cy="97" rx="22" ry="15" fill="#DEB8CC"/>
  <ellipse cx="122" cy="97" rx="22" ry="15" fill="#DEB8CC"/>
  <!-- Eyelid bottom curve -->
  <path d="M 56 97 Q 78 108 100 97" stroke="#C090A8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 97 Q 122 108 144 97" stroke="#C090A8" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="100" cy="122" r="4" fill="#C090A8"/>

  <!-- Cheeks (faint) -->
  <ellipse cx="57" cy="130" rx="18" ry="11" fill="#C090A8" opacity="0.2"/>
  <ellipse cx="143" cy="130" rx="18" ry="11" fill="#C090A8" opacity="0.2"/>

  <!-- Tired flat mouth -->
  <path d="M 86 138 Q 100 134 114 138" stroke="#8B4C6A" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Sweat drop -->
  <path d="M 148 72 C 142 64 140 78 148 84 C 156 78 154 64 148 72 Z" fill="#A8D8F0"/>

  <!-- ZZZ sleeping -->
  <path d="M 154 54 L 164 54 L 154 65 L 164 65" stroke="#A8D8F0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 163 38 L 176 38 L 163 52 L 176 52" stroke="#A8D8F0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 173 20 L 188 20 L 173 37 L 188 37" stroke="#A8D8F0" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
