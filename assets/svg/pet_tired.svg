<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- ear bumps (muted) -->
  <circle cx="55" cy="62" r="22" fill="#D8AABF"/>
  <circle cx="145" cy="62" r="22" fill="#D8AABF"/>
  <!-- body -->
  <ellipse cx="100" cy="120" rx="68" ry="63" fill="#DEB8CC"/>
  <ellipse cx="100" cy="120" rx="68" ry="63" fill="none" stroke="#C090A8" stroke-width="3"/>
  <!-- arms drooping slightly -->
  <ellipse cx="36" cy="115" rx="16" ry="22" fill="#DEB8CC" stroke="#C090A8" stroke-width="2.5" transform="rotate(18 36 115)"/>
  <ellipse cx="164" cy="115" rx="16" ry="22" fill="#DEB8CC" stroke="#C090A8" stroke-width="2.5" transform="rotate(-18 164 115)"/>
  <!-- half-closed eyes -->
  <circle cx="78" cy="110" r="12" fill="white"/>
  <circle cx="122" cy="110" r="12" fill="white"/>
  <circle cx="78" cy="112" r="7" fill="#3D1A00"/>
  <circle cx="122" cy="112" r="7" fill="#3D1A00"/>
  <circle cx="80" cy="109" r="2" fill="white"/>
  <circle cx="124" cy="109" r="2" fill="white"/>
  <!-- droopy eyelids -->
  <path d="M 66 108 Q 78 102 90 108" fill="#DEB8CC"/>
  <path d="M 110 108 Q 122 102 134 108" fill="#DEB8CC"/>
  <!-- cheeks (faint) -->
  <ellipse cx="63" cy="126" rx="13" ry="8" fill="#C090A8" opacity="0.3"/>
  <ellipse cx="137" cy="126" rx="13" ry="8" fill="#C090A8" opacity="0.3"/>
  <!-- nose -->
  <circle cx="100" cy="118" r="3" fill="#C090A8"/>
  <!-- neutral/slight frown -->
  <path d="M 84 136 Q 100 131 116 136" fill="none" stroke="#8B4C6A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- sweat drop -->
  <g transform="translate(140, 75)">
    <path d="M0,-11 C-6,-7 -8,1 0,11 C8,1 6,-7 0,-11Z" fill="#A8D8F0"/>
  </g>
  <g transform="translate(152, 85)">
    <path d="M0,-7 C-4,-4 -5,1 0,7 C5,1 4,-4 0,-7Z" fill="#A8D8F0"/>
  </g>
</svg>
