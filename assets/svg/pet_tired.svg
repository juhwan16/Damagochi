<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bodyT" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#EED8E8"/>
      <stop offset="100%" stop-color="#D4A8BC"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="191" rx="48" ry="7" fill="#C090A8" opacity="0.13"/>

  <!-- Ears -->
  <ellipse cx="62" cy="54" rx="22" ry="26" fill="#CCA8BC"/>
  <ellipse cx="62" cy="58" rx="12" ry="16" fill="#EED8EC"/>
  <ellipse cx="138" cy="54" rx="22" ry="26" fill="#CCA8BC"/>
  <ellipse cx="138" cy="58" rx="12" ry="16" fill="#EED8EC"/>

  <!-- Body -->
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="url(#bodyT)"/>
  <ellipse cx="100" cy="122" rx="72" ry="70" fill="none" stroke="#C0A0B0" stroke-width="2.5"/>
  <!-- Dim body shine -->
  <ellipse cx="75" cy="97" rx="24" ry="15" fill="white" opacity="0.13" transform="rotate(-20 75 97)"/>

  <!-- Arms drooping -->
  <ellipse cx="21" cy="135" rx="17" ry="13" fill="#D8B4C8" stroke="#C0A0B0" stroke-width="2"/>
  <ellipse cx="179" cy="135" rx="17" ry="13" fill="#D8B4C8" stroke="#C0A0B0" stroke-width="2"/>

  <!-- Eye whites -->
  <ellipse cx="78" cy="107" rx="19" ry="21" fill="white"/>
  <ellipse cx="122" cy="107" rx="19" ry="21" fill="white"/>

  <!-- Pupils shifted down -->
  <circle cx="78" cy="114" r="12" fill="#2A1000"/>
  <circle cx="122" cy="114" r="12" fill="#2A1000"/>

  <!-- Dim highlights -->
  <circle cx="73" cy="110" r="4" fill="white" opacity="0.7"/>
  <circle cx="117" cy="110" r="4" fill="white" opacity="0.7"/>

  <!-- Eyelid overlay (half-closes the eye) -->
  <ellipse cx="78" cy="97" rx="21" ry="15" fill="#D8B8C8"/>
  <ellipse cx="122" cy="97" rx="21" ry="15" fill="#D8B8C8"/>
  <!-- Eyelid bottom edge line -->
  <path d="M 57 97 Q 78 109 99 97" stroke="#B89AB0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 101 97 Q 122 109 143 97" stroke="#B89AB0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <circle cx="100" cy="122" r="3.5" fill="#B890A8"/>

  <!-- Faint blush -->
  <ellipse cx="57" cy="131" rx="18" ry="11" fill="#C090A8" opacity="0.22"/>
  <ellipse cx="143" cy="131" rx="18" ry="11" fill="#C090A8" opacity="0.22"/>

  <!-- Tired flat mouth -->
  <path d="M 87 139 Q 100 135 113 139" stroke="#8B5070" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Sweat drop -->
  <path d="M 148 74 C 143 66 141 79 148 85 C 155 79 153 66 148 74 Z" fill="#B8DCF0"/>

  <!-- ZZZ -->
  <path d="M 154 58 L 163 58 L 154 68 L 163 68" stroke="#A8CDE0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 162 42 L 174 42 L 162 55 L 174 55" stroke="#A8CDE0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 172 24 L 187 24 L 172 40 L 187 40" stroke="#A8CDE0" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
